name: Supabase keep-alive

# El free tier de Supabase pausa el proyecto tras 7 días sin actividad.
# Este job hace un ping cada pocos días para mantenerlo despierto.
# Requiere los secrets del repo: SUPABASE_URL y SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '0 7 */3 * *' # cada 3 días a las 07:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST endpoint
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Faltan los secrets SUPABASE_URL / SUPABASE_ANON_KEY"; exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "HTTP $code"
          # 200/401/404 valen: cualquier respuesta cuenta como actividad.
          if [ "$code" = "000" ]; then echo "Sin respuesta"; exit 1; fi
